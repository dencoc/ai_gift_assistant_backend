version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ai_gift_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-ai_gift_assistant}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_gift_network

  redis:
    image: redis:7-alpine
    container_name: ai_gift_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-xnjnfrjtghjvbc}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_gift_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_gift_app
    environment:
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_TELEGRAM_SECRET: ${JWT_TELEGRAM_SECRET}
      SERVER_URL: ${SERVER_URL:-http://localhost:3000}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-ai_gift_assistant}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-xnjnfrjtghjvbc}
      MAIL_ADDRESS: ${MAIL_ADDRESS}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_PASSWORD2: ${MAIL_PASSWORD2}
      MAIL_SMTP: ${MAIL_SMTP}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_SECURE: ${MAIL_SECURE}
      EMAIL_CONFIRM_URL: ${EMAIL_CONFIRM_URL}
      EMAIL_RESET_PASSWORD_URL: ${EMAIL_RESET_PASSWORD_URL}
      TG_BOT_TOKEN: ${TG_BOT_TOKEN}
      BOT_USERNAME: ${BOT_USERNAME}
      AI_CHAT_AGENT_HOST: ${AI_CHAT_AGENT_HOST}
      CLIENT_URL: ${CLIENT_URL}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
      - /app/node_modules
    networks:
      - ai_gift_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ai_gift_network:
    driver: bridge
